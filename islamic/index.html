<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic - Compass & Ramadan 2026</title>

    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; box-sizing: border-box; background-color: #f4f4f4; }

        /* Compass Style */
        .compass-container { margin-top: 20px; position: relative; width: 200px; height: 200px; border-radius: 50%; background-color: #fff; box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1); display: flex; justify-content: center; align-items: center; margin-left: auto; margin-right: auto; }
        .compass-needle { width: 0; height: 0; border-left: 20px solid transparent; border-right: 20px solid transparent; border-top: 60px solid red; position: absolute; top: 50%; left: 50%; transform-origin: 50% 50%; transform: translate(-50%, -100%); z-index: 1; }
        .qibla-indicator { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; transform: translate(-50%, -50%); background-image: url('kaaba_icon.png'); background-size: contain; background-repeat: no-repeat; background-position: center; }
        .error-message { margin-top: 10px; color: red; text-align: center; }

        /* Ramadan Widget Style */
        
        /* =========================================================================================
           নোট ১: রমজান শেষ হলে উইজেটটি হাইড করতে নিচের লাইনে display: block; এর জায়গায় display: none; লিখে দিন 
           ========================================================================================= */
        #ramadan-widget { display: block; width: 92%; margin: 20px auto; background: linear-gradient(135deg, #004422, #006633); color: white; padding: 15px; border-radius: 12px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2); position: relative; box-sizing: border-box;}
        
        #live-clock { position: absolute; top: 10px; right: 15px; font-size: 11px; background: rgba(0,0,0,0.3); padding: 2px 8px; border-radius: 20px; font-family: monospace; display: flex; align-items: center; gap: 5px; }
        .wake-lock-btn { background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 2px 6px; border-radius: 12px; font-size: 9px; cursor: pointer; white-space: nowrap; }
        .district-select { margin-bottom: 10px; padding: 6px; border-radius: 5px; width: 150px; cursor: pointer; border: none; font-weight: bold; background: #fff; margin-top: 10px; }
        #countdown-container { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 10px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.1); }
        #timer-label { font-size: 13px; opacity: 0.9; }
        #timer-clock { font-size: 28px; font-weight: bold; color: #ffeb3b; margin: 2px 0; text-shadow: 1px 1px 3px rgba(0,0,0,0.5); }
        .timer-row { display: flex; justify-content: space-around; margin-top: 10px; font-weight: bold; }
        .time-box { display: flex; flex-direction: column; background: rgba(255,255,255,0.15); padding: 8px; border-radius: 10px; min-width: 85px; }
        .time-label { font-size: 10px; opacity: 0.9; margin-bottom: 3px; }
        .time-val { font-size: 16px; }
        .view-btn { margin-top: 15px; font-size: 13px; text-decoration: underline; cursor: pointer; color: #fff; display: block; opacity: 0.8; }
        
        /* Modal Style */
        #calendar-modal { display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); overflow-y: auto; }
        .modal-content { background: #fff; margin: 5% auto; padding: 15px; width: 95%; border-radius: 10px; color: #333; position: relative; box-sizing: border-box; }
        .close-btn { position: absolute; right: 15px; top: 10px; font-size: 30px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 11px; }
        th, td { border: 1px solid #ddd; padding: 6px 1px; text-align: center; }
        th { background-color: #004422; color: white; position: sticky; top: 0; }
        .today-highlight { background-color: #ffeb3b !important; font-weight: bold; }

        /* ভিডিও কন্টেইনার - অটোপ্লে বন্ধ */
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; width: 90%; margin: 20px auto 0; background: #000; cursor: pointer; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; pointer-events: none; }
        .video-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; color: white; font-size: 20px; z-index: 10; }
        .video-overlay span { background: rgba(0,0,0,0.7); padding: 10px 20px; border-radius: 30px; border: 2px solid white; }
        
        .banner-container { display: flex; justify-content: center; margin: 20px 0 15px 0; }
        .banner-container a { width: 80%; display: block; text-decoration: none; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2); }
        .banner-container img { width: 100%; height: auto; display: block; }
        .newspaper { display: flex; justify-content: center; margin-bottom: 15px; }
        .newspaper a { display: inline-block; width: 80%; text-align: center; padding: 10px; background-color: #003366; border-radius: 10px; text-decoration: none; font-size: 18px; color: #FFFFFF; background-image: linear-gradient(135deg, #003366, #002244); box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); }
        
        /* নোটিফিকেশন স্টাইল */
        #audio-notification { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); color: white; padding: 10px 20px; border-radius: 30px; font-size: 14px; z-index: 10000; border: 2px solid #ffeb3b; white-space: nowrap; }
    </style>

// নোটিফিকেশন দেখানোর ফাংশন
function showNotification(message, duration = 3000) {
    const notif = document.getElementById('audio-notification');
    notif.textContent = message;
    notif.style.display = 'block';
    
    if (notificationTimeout) clearTimeout(notificationTimeout);
    notificationTimeout = setTimeout(() => {
        notif.style.display = 'none';
    }, duration);
}

// ওয়েক লক ফাংশন - এলার্ট ছাড়া
async function toggleWakeLock() {
    const btn = document.getElementById('wakeLockBtn');
    if (wakeLock === null) {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                btn.textContent = '⚡ সক্রিয় আছে';
                btn.style.background = '#ffeb3b';
                btn.style.color = '#004422';
                
                // সাইলেন্ট অডিও চালান
                silentAudio.volume = 0.01;
                silentAudio.play().catch(e => console.log("Silent audio play failed:", e));
                
                wakeLock.addEventListener('release', () => {
                    wakeLock = null;
                    btn.textContent = '⚡ সক্রিয় রাখুন';
                    btn.style.background = 'rgba(255,255,255,0.2)';
                    btn.style.color = 'white';
                    silentAudio.pause();
                });
                
                showNotification('✅ অ্যাপ সক্রিয় রাখা হবে');
            } else {
                showNotification('⚠️ আপনার ডিভাইস এই সুবিধা সাপোর্ট করে না');
                btn.style.opacity = '0.5';
            }
        } catch (err) {
            console.log('Wake Lock error:', err);
            showNotification('⚠️ ওয়েক লক সক্রিয় করা যায়নি');
        }
    } else {
        await wakeLock.release();
        wakeLock = null;
        btn.textContent = '⚡ সক্রিয় রাখুন';
        btn.style.background = 'rgba(255,255,255,0.2)';
        btn.style.color = 'white';
        silentAudio.pause();
        showNotification('⏸️ অ্যাপ নিষ্ক্রিয় মোডে');
    }
}

function stopAllAudio() {
    preSehriAudio.pause();
    preSehriAudio.currentTime = 0;
    sirenAudio.pause();
    sirenAudio.currentTime = 0;
    iftarAudio.pause();
    iftarAudio.currentTime = 0;
}

function updateView() {
    const district = document.getElementById('district-picker').value;
    const now = new Date();
    const day = now.getDate();
    const month = now.toLocaleString('en-GB', { month: 'short' });
    const todayStr = `${day} ${month}`;

    let todayData = ramadanData[district].find(item => item.d === todayStr) || ramadanData[district][ramadanData[district].length - 1];
    
    document.getElementById('today-sehri').innerText = todayData.s;
    document.getElementById('today-fajr').innerText = todayData.f;
    document.getElementById('today-iftar').innerText = todayData.i;
    document.getElementById('display-date').innerText = `${todayData.r} রমজান | ${todayData.d} | ${todayData.bn}`;

    stopAllAudio();
    isPreSehriPlayed = false;
    isSirenPlayed = false;
    isIftarPlayed = false;
    
    startRamadanLogic(todayData.s, todayData.i);
}

function startRamadanLogic(sehri, iftar) {
    if (ramadanInterval) clearInterval(ramadanInterval);
    if (resetInterval) clearInterval(resetInterval);
    
    resetInterval = setInterval(() => {
        const now = new Date();
        if (now.getHours() === 0 && now.getMinutes() === 0 && now.getSeconds() === 0) {
            isPreSehriPlayed = false;
            isSirenPlayed = false;
            isIftarPlayed = false;
        }
    }, 1000);
    
    ramadanInterval = setInterval(() => {
        const now = new Date();
        document.getElementById('live-clock').innerHTML = now.toLocaleTimeString('en-GB') + ' <button class="wake-lock-btn" onclick="toggleWakeLock()" id="wakeLockBtn">' + 
            (wakeLock ? '⚡ সক্রিয় আছে' : '⚡ সক্রিয় রাখুন') + '</button>';
        
        const sehriParts = sehri.split(':');
        const iftarParts = iftar.split(':');
        
        const sTime = new Date(); 
        sTime.setHours(parseInt(sehriParts[0]), parseInt(sehriParts[1]), 0);
        
        const iTime = new Date(); 
        iTime.setHours(parseInt(iftarParts[0]) + 12, parseInt(iftarParts[1]), 0);

        let target, label;
        if (now < sTime) { 
            target = sTime; 
            label = "সেহরীর বাকি"; 
        }
        else if (now < iTime) { 
            target = iTime; 
            label = "ইফতারের বাকি"; 
            if (isPreSehriPlayed || isSirenPlayed) {
                stopAllAudio();
            }
        }
        else { 
            label = "ইফতার সম্পন্ন"; 
            document.getElementById('timer-clock').innerText = "00:00:00";
            stopAllAudio();
            return; 
        }

        const diff = target - now;
        const h = Math.floor(diff / 3600000);
        const m = Math.floor((diff % 3600000) / 60000);
        const s = Math.floor((diff % 60000) / 1000);
        
        document.getElementById('timer-label').innerText = label;
        document.getElementById('timer-clock').innerText = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;

        // সেহরী প্রি-টাইমার (১ মিনিট বাকি থাকলে) - একবার বাজবে
        if (label === "সেহরীর বাকি" && diff <= 60000 && diff > 2000 && !isPreSehriPlayed) {
            stopAllAudio();
            
            preSehriAudio.play().catch(e => console.log("Pre-sehri audio play failed:", e));
            isPreSehriPlayed = true;
            console.log("Pre-sehri timer started at:", new Date().toLocaleTimeString());
            
            // নোটিফিকেশন দেখান
            showNotification('🔔 সেহরীর ১ মিনিট বাকি');
        }

        // সেহরী শেষ হওয়ার মুহূর্তে (ঠিক ১ সেকেন্ডে)
        if (label === "সেহরীর বাকি" && diff <= 1000 && diff > 0 && !isSirenPlayed) {
            preSehriAudio.pause();
            preSehriAudio.currentTime = 0;
            
            // সামান্য বিলম্বে সাইরেন বাজান (ক্রসফেইড ইফেক্ট এড়াতে)
            setTimeout(() => {
                if (!isSirenPlayed) {
                    sirenAudio.play().catch(e => console.log("Siren play failed:", e));
                    isSirenPlayed = true;
                    console.log("Siren played at sehri end:", new Date().toLocaleTimeString());
                    showNotification('⚠️ সেহরীর সময় শেষ');
                }
            }, 50);
        }

        // ইফতার টাইমার
        if (label === "ইফতারের বাকি" && diff <= 1000 && diff > 0 && !isIftarPlayed) {
            iftarAudio.play().catch(e => console.log("Iftar audio failed:", e));
            isIftarPlayed = true;
            console.log("Iftar time at:", new Date().toLocaleTimeString());
            showNotification('🍴 ইফতারের সময় হয়েছে');
        }

        // সেহরী টাইম পার হয়ে গেলে অডিও বন্ধ
        if (now > sTime && (isPreSehriPlayed || isSirenPlayed)) {
            stopAllAudio();
        }

    }, 1000);
}

function showCalendar() {
    const district = document.getElementById('district-picker').value;
    const now = new Date(); 
    const todayStr = `${now.getDate()} ${now.toLocaleString('en-GB', { month: 'short' })}`;
    let table = `<table><tr><th>রমজান</th><th>ইংলিশ</th><th>বাংলা</th><th>সেহরী</th><th>ফজর</th><th>ইফতার</th></tr>`;
    ramadanData[district].forEach(d => {

    });
    table += `</table>`;
    document.getElementById('calendar-table-container').innerHTML = table;
    document.getElementById('calendar-modal').style.display = 'block';
}

function closeCalendar() { 
    document.getElementById('calendar-modal').style.display = 'none'; 
}

/* ---------------- Compass Logic ---------------- */
const needle = document.getElementById('needle');
const errorDiv = document.getElementById('error');
const qiblaLat = 21.4225, qiblaLng = 39.8262;
let latitude, longitude;

function updateCompass(heading) {
    if(!latitude) return;
    const phiK = qiblaLat * Math.PI / 180, lambdaK = qiblaLng * Math.PI / 180;
    const phi = latitude * Math.PI / 180, lambda = longitude * Math.PI / 180;
    const y = Math.sin(lambdaK - lambda) * Math.cos(phiK);
    const x = Math.cos(phi) * Math.sin(phiK) - Math.sin(phi) * Math.cos(phiK) * Math.cos(lambdaK - lambda);
    const qiblaAngle = Math.atan2(y, x) * 180 / Math.PI;
    needle.style.transform = `translate(-50%, -100%) rotate(${heading + qiblaAngle}deg)`;
}

if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(position => {
        latitude = position.coords.latitude; 
        longitude = position.coords.longitude;
        window.addEventListener('deviceorientationabsolute', e => { 
            if (e.alpha !== null) updateCompass(360 - e.alpha); 
        }, true);
    }, err => { 
        errorDiv.style.display = 'block'; 
        errorDiv.textContent = "Location Error: " + err.message; 
    });
}

    overlay.style.display = 'none';
});

// পৃষ্ঠা লোড
window.onload = function() {
    updateView();
};

// পৃষ্ঠা ছেড়ে যাওয়ার সময়
window.onbeforeunload = function() {
    if (ramadanInterval) clearInterval(ramadanInterval);
    if (resetInterval) clearInterval(resetInterval);
    stopAllAudio();
    if (wakeLock) {
        wakeLock.release();
    }
    silentAudio.pause();
};
</script>
</body>
</html>
