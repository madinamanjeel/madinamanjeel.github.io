<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>আমাদের লাইব্রেরি</title>
  <style>
    body {
      font-family: 'Georgia', serif;
      background-color: #f9f9f9;
      color: #333;
      margin: 0;
      padding: 0;
    }

    header {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 30px 10px;
    }

    header h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    header p {
      font-size: 1.1rem;
      margin-top: 10px;
    }

    .library-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      padding: 30px;
      max-width: 1200px;
      margin: auto;
    }

    .book-card {
      background-color: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 20px;
      text-align: center;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .book-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
    }

    .book-card a {
      text-decoration: none;
      color: #2c3e50;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .book-card p {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #555;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>

<header>
  <h1>📚 আমাদের লাইব্রেরি</h1>
  <p>বাছাই করা পাঠ্যপুস্তক ও জনপ্রিয় বইসমূহ এক জায়গায়</p>
</header>

<div class="library-container">
  <div class="book-card">
    <a href="https://nctb.gov.bd/pages/static-pages/695b97ffc4774958d7b70329">পাঠ্যপুস্তক ২০২৬</a>
    <p>জাতীয় শিক্ষাক্রম অনুযায়ী বইসমূহ</p>
  </div>

  <div class="book-card">
    <a href="https://drive.google.com/drive/folders/14acaVXqqTKDmRp7HZhwNQo24Hn2SqKXg">ইসলামিক বই</a>
    <p>ইসলামী জ্ঞানভিত্তিক পুস্তক সংগ্রহ</p>
  </div>

  <div class="book-card">
    <a href="https://drive.google.com/drive/folders/14S04CpAqBJvUho4IEHY-AGjlzb1SQ2fc">তিন গোয়েন্দা সিরিজ</a>
    <p>জনপ্রিয় কিশোর উপন্যাস সিরিজ</p>
  </div>
</div>

</body>
</html>
