<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madina Manjeel - BMS Global Viewer</title>
    <style>
        :root {
            --primary-bg: #00bcd4;
            --card-bg: #ffffff;
            --text-dark: #333333;
            --text-muted: #757575;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f1f3f6;
            color: var(--text-dark);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 95vh;
        }
        
        .dashboard-container {
            width: 100%;
            max-width: 1100px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            display: grid;
            grid-template-columns: 320px 1fr;
            overflow: hidden;
            border: 1px solid #e3e8ee;
        }

        .left-panel {
            background: var(--primary-bg);
            color: white;
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* মাঝখানে রাখার জন্য */
            text-align: center;
            gap: 20px;
        }
        .device-mac { font-size: 13px; opacity: 0.8; letter-spacing: 1px; }
        .device-name { font-size: 19px; font-weight: bold; margin-top: 5px; }

        .circle-container {
            position: relative;
            width: 160px;
            height: 160px;
            margin: 15px auto;
        }
        .circle-svg { transform: rotate(-90deg); }
        .circle-bg { fill: none; stroke: rgba(255,255,255,0.18); stroke-width: 12; }
        .circle-progress { 
            fill: none; 
            stroke: #ffffff; 
            stroke-width: 12; 
            stroke-linecap: round; 
            stroke-dasharray: 440; 
            stroke-dashoffset: 440;
            transition: stroke-dashoffset 0.8s ease;
        }
        .circle-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
        }
        .percentage { font-size: 38px; font-weight: bold; }
        .lang-text { font-size: 11px; opacity: 0.8; }

        .side-stats {
            width: 100%;
            font-size: 13px;
            margin: 15px 0;
            text-align: left;
            background: rgba(0,0,0,0.1);
            padding: 10px;
            border-radius: 8px;
            box-sizing: border-box;
        }
        .side-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.08); align-items: center; }
        .side-row:last-child { border-bottom: none; }
        .dot { height: 8px; width: 8px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-left: 6px; transition: background-color 0.3s; }
        .dot.on { background-color: #a7ffeb; box-shadow: 0 0 6px #a7ffeb; }
        .status-tag { font-weight: bold; display: inline-flex; align-items: center; }

        .right-panel {
            padding: 20px;
            background: #fafbfc;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .status-header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fff;
            padding: 12px 15px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            border: 1px solid #eef2f5;
            margin-bottom: 15px;
        }
        .charge-state-box { display: flex; align-items: center; gap: 8px; font-weight: bold; font-size: 14px; }
        .sync-status { font-size: 12px; color: var(--text-muted); }

        .data-grid-pc {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 15px;
        }
        .pc-card {
            background: white;
            padding: 12px 8px;
            border-radius: 10px;
            border: 1px solid #eef2f5;
            text-align: center;
            border-bottom: 3px solid #e0e0e0;
        }
        .card-val { font-size: 22px; font-weight: bold; color: #00bcd4; margin-bottom: 3px; }
        .card-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }

        .bottom-layout {
            display: grid;
            grid-template-columns: 1fr; /* গ্লোবাল ভিউতে শুধু ব্যাটারি স্ট্যাটাস কার্ড রাখলেই হবে */
            gap: 15px;
        }
        .sys-status-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #eef2f5;
            text-align: center;
        }
        .section-title { font-size: 13px; color: var(--text-muted); font-weight: bold; margin-bottom: 10px; text-transform: uppercase; }
        .sys-status-text { font-size: 22px; color: #00bcd4; font-weight: bold; }

        @media (max-width: 768px) {
            body { padding: 5px; }
            .dashboard-container { grid-template-columns: 1fr; border-radius: 8px; }
            .left-panel { padding: 20px 15px; }
            .right-panel { padding: 12px; }
            .status-header-bar { flex-direction: column; gap: 10px; align-items: flex-start; }
            .data-grid-pc { grid-template-columns: repeat(2, 1fr); gap: 8px; }
        }
    </style>
</head>
<body>

<div class="dashboard-container">
    <div class="left-panel">
        <div>
            <div class="device-mac">A5:C2:39:3F:07:72</div>
            <div class="device-name">Madina-Manjeel-Remote</div>
        </div>

        <div class="circle-container">
            <svg class="circle-svg" width="160" height="160">
                <circle class="circle-bg" cx="80" cy="80" r="70"></circle>
                <circle class="circle-progress" id="progressRing" cx="80" cy="80" r="70"></circle>
            </svg>
            <div class="circle-text">
                <div class="percentage"><span id="socVal">--</span><span style="font-size:16px">%</span></div>
                <div class="lang-text">剩余电量</div>
            </div>
        </div>

        <div class="side-stats">
            <div class="side-row"><span>BattType:</span> <span style="font-weight:bold;">LFP</span></div>
            <div class="side-row" style="border-top: 1px solid rgba(255,255,255,0.2); margin-top:4px; padding-top:6px;"><span>Cap Capacity:</span> <span>100 Ah</span></div>
        </div>
    </div>

    <div class="right-panel">
        <div class="status-header-bar">
            <div class="charge-state-box">
                <span id="chargeIcon">🔌</span> 
                <span id="chargeState" style="color: #2e7d32;">Connecting to Cloud...</span>
            </div>
            <div class="sync-status">
                আপডেট: <span id="updateTime" style="font-weight: bold; color: #00bcd4;">--</span>
            </div>
        </div>

        <div class="data-grid-pc">
            <div class="pc-card"><div class="card-val" id="totalVolt">-- V</div><div class="card-lbl">Total Volt</div></div>
            <div class="pc-card"><div class="card-val" id="currentVal">-- A</div><div class="card-lbl">Current</div></div>
            <div class="pc-card"><div class="card-val" id="powerVal">-- W</div><div class="card-lbl">Power</div></div>
            <div class="pc-card"><div class="card-val" id="mosTemp">-- °C</div><div class="card-lbl">MOS Temp</div></div>
        </div>

        <div class="bottom-layout">
            <div class="sys-status-box">
                <div class="section-title">BATTERY STATUS</div>
                <div class="sys-status-text" id="bmsStatus">Fetching...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // আপনার ফায়ারবেস রিয়েল-টাইম ডেটাবেস ইউআরএল
    const FIREBASE_URL = "https://family-429c7-default-rtdb.asia-southeast1.firebasedatabase.app/";

    const safeGet = (id) => document.getElementById(id) || { innerText: "", style: {} };
    const progressRing = document.getElementById('progressRing');

    function setProgress(percent) {
        if (!progressRing) return;
        const radius = progressRing.r.baseVal.value;
        const circumference = radius * 2 * Math.PI;
        const offset = circumference - (percent / 100) * circumference;
        progressRing.style.strokeDashoffset = offset;
    }

    async function fetchBMSData() {
        const targetUrl = `${FIREBASE_URL}bms_data.json`;

        try {
            const response = await fetch(targetUrl);
            if (response.ok) {
                const data = await response.json();
                if (data) {
                    // ভোল্টেজ ও কারেন্ট আপডেট
                    const volt = parseFloat(data.voltage || 0);
                    const curr = parseFloat(data.current || 0);
                    
                    safeGet('totalVolt').innerText = `${volt.toFixed(2)} V`;
                    safeGet('currentVal').innerText = `${curr.toFixed(2)} A`;
                    
                    // পাওয়ার ক্যালকুলেশন
                    const power = (volt * curr).toFixed(1);
                    safeGet('powerVal').innerText = `${Math.abs(power)} W`;

                    // SOC (ব্যাটারি চার্জ পার্সেন্টেজ)
                    const soc = parseInt(data.soc || 0);
                    safeGet('socVal').innerText = soc;
                    setProgress(soc);

                    // তাপমাত্রা
                    safeGet('mosTemp').innerText = `${data.temperature || "--"} °C`;
                    
                    // সর্বশেষ আপডেটের সময়
                    safeGet('updateTime').innerText = data.last_updated || "--";

                    // চার্জিং/ডিসচার্জিং স্ট্যাটাস নির্ধারণ
                    const currentAbs = Math.abs(curr);
                    if (currentAbs > 0.15) {
                        if (curr > 0) {
                            safeGet('chargeState').innerText = "Charging";
                            safeGet('chargeIcon').innerText = "⚡";
                            safeGet('bmsStatus').innerText = "Charging Active";
                        } else {
                            safeGet('chargeState').innerText = "Discharging";
                            safeGet('chargeIcon').innerText = "🔋";
                            safeGet('bmsStatus').innerText = "Discharging Active";
                        }
                    } else {
                        safeGet('chargeState').innerText = "Idle / Full";
                        safeGet('chargeIcon').innerText = "🔌";
                        safeGet('bmsStatus').innerText = "Standby / Fully Charged";
                    }
                }
            }
        } catch (error) {
            console.error("Cloud Fetch failed:", error);
            safeGet('bmsStatus').innerText = "Connection Error ❌";
        }
    }

    // প্রতি ৩ সেকেন্ড পর পর ফায়ারবেস থেকে লাইভ ডেটা আপডেট নিয়ে আসবে
    setInterval(fetchBMSData, 3000);
    fetchBMSData(); // প্রথমবার রান করার জন্য
</script>

</body>
</html>
